<!DOCTYPE html>
<html>
<head>
    <title>TranAx</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
    <script type="module" src="popup.js"></script>
</head>
<body>
    <h1>TranAx</h1>

    <div id="message" class="hidden">
        Cannot Run<br />
        Please navigate to <a href="http://walmart.com/orders">Walmart Orders</a>
    </div>

    <div id="content" class="hidden">
        <section id="main-page" class="page">
            <div>
                Select the date for how far back you'd like to pull transations.
                The further back you select, the longer the time required to pull
                the data.
            </div>

            <div id="date-container">
                <select id="year"></select>
                <select id="month"></select>
                <select id="day"></select>
            </div>

            <div class="button-row">
                <button id="download-btn">Download Data</button>
                <button id="open-test-btn" type="button">Testing</button>
            </div>
        </section>

        <section id="test-page" class="page hidden">
            <div class="button-row">
                <button id="back-btn" type="button">Back</button>
                <button id="run-tests-btn" type="button">Run Tests</button>
            </div>

            <div id="test-status" class="status-text"></div>

            <table id="test-table">
                <thead>
                    <tr>
                        <th>Label</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody id="test-results-body"></tbody>
            </table>
        </section>
    </div>
</body>
</html>
